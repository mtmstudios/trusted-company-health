name: Deploy to Mittwald

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci && npm run build
      - uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ssh.frotheim.project.host
          port: 22
          username: sftp-kq7vun@p-aerefh
          password: ${{ secrets.MITTWALD_SFTP_PASSWORD }}
          local_path: ./dist/*
          remote_path: /html
