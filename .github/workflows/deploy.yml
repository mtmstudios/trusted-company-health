name: Deploy to Mittwald

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install & Build
        run: |
          bun install
          bun run build
      - uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ssh.frotheim.project.host
          port: 22
          username: sftp-kq7vun@p-aerefh
          password: ${{ secrets.MITTWALD_SFTP_PASSWORD }}
          local_path: ./dist/*
          remote_path: /html
          sftp_only: true
